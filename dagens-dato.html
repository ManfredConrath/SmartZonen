<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dagens dato – SmartZonen</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    #smart-dagens-dato{
      --card:#ffffff;
      --card-border:#e5e7eb;
      --panel:#f8fafc;
      --panel-strong:#eef5f6;
      --text:#1f2937;
      --muted:#6b7280;
      --highlight:#ffffff;
      --picker-bg:#f8fafc;
      --picker-text:#1f2937;
      --picker-muted:rgba(31,41,55,.35);
      --picker-active:rgba(15,118,110,.10);
      --picker-border:#d7e3e6;
      --item-h:58px;
      --btn:#0f766e;
      --neutral:#6b7280;
    }

    #smart-dagens-dato *{
      box-sizing:border-box;
    }

    #smart-dagens-dato{
      max-width:1000px;
      margin:0 auto;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:#1f2937;
    }

    #smart-dagens-dato .module{
      background:var(--card);
      border:1px solid var(--card-border);
      border-radius:24px;
      box-shadow:0 8px 24px rgba(15,23,42,.06);
      padding:28px 24px 24px;
    }

    #smart-dagens-dato .module-inner{
      max-width:900px;
      margin:0 auto;
    }

    #smart-dagens-dato .top-grid{
      display:grid;
      grid-template-columns:1.35fr 1fr 1fr;
      gap:16px;
      margin-bottom:18px;
    }

    #smart-dagens-dato .card{
      background:var(--panel);
      border:1px solid var(--card-border);
      border-radius:20px;
      padding:18px;
      min-height:120px;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }

    #smart-dagens-dato .display-btn{
      width:100%;
      min-height:78px;
      border:0;
      background:transparent;
      color:var(--text);
      font-size:clamp(24px,2vw,32px);
      font-weight:800;
      line-height:1.15;
      text-align:center;
      cursor:pointer;
    }

    #smart-dagens-dato .display-btn small{
      display:block;
      margin-top:8px;
      font-size:14px;
      font-weight:700;
      color:var(--muted);
    }

    #smart-dagens-dato .picker-card{
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:stretch;
      justify-content:flex-start;
    }

    #smart-dagens-dato .picker-title{
      font-size:15px;
      font-weight:800;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.03em;
      text-align:center;
    }

    #smart-dagens-dato .wheel{
      height:calc(var(--item-h) * 3);
      overflow:hidden;
      position:relative;
      border-radius:16px;
      background:var(--picker-bg);
      border:1px solid var(--picker-border);
    }

    #smart-dagens-dato .wheel::before,
    #smart-dagens-dato .wheel::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      height:26px;
      z-index:2;
      pointer-events:none;
    }

    #smart-dagens-dato .wheel::before{
      top:0;
      background:linear-gradient(to bottom, rgba(248,250,252,1), rgba(248,250,252,0));
    }

    #smart-dagens-dato .wheel::after{
      bottom:0;
      background:linear-gradient(to top, rgba(248,250,252,1), rgba(248,250,252,0));
    }

    #smart-dagens-dato .wheel-list{
      height:100%;
      overflow-y:auto;
      scroll-snap-type:y mandatory;
      scrollbar-width:none;
      -ms-overflow-style:none;
      position:relative;
      z-index:1;
    }

    #smart-dagens-dato .wheel-list::-webkit-scrollbar{
      display:none;
    }

    #smart-dagens-dato .wheel-item{
      height:var(--item-h);
      display:flex;
      align-items:center;
      justify-content:center;
      scroll-snap-align:center;
      color:var(--picker-text);
      font-size:24px;
      font-weight:800;
      letter-spacing:.01em;
      opacity:.42;
      transition:opacity .15s ease, transform .15s ease, color .15s ease, background .15s ease;
      user-select:none;
    }

    #smart-dagens-dato .wheel-item.active{
      opacity:1;
      color:var(--text);
      background:var(--picker-active);
      transform:scale(1.02);
    }

    #smart-dagens-dato .picker-actions{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

    #smart-dagens-dato .picker-btn{
      appearance:none;
      border:0;
      border-radius:14px;
      min-height:46px;
      padding:0 16px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 4px 10px rgba(15,23,42,.10);
    }

    #smart-dagens-dato .picker-btn.cancel{
      background:#e8eff1;
      color:#284046;
    }

    #smart-dagens-dato .picker-btn.ok{
      background:var(--btn);
      color:#fff;
    }

    #smart-dagens-dato .actions{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:4px;
      margin-bottom:18px;
    }

    #smart-dagens-dato button.primary{
      appearance:none;
      border:0;
      border-radius:14px;
      padding:12px 16px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 4px 10px rgba(15,23,42,.12);
      background:var(--btn);
      color:#fff;
    }

    #smart-dagens-dato button.secondary{
      appearance:none;
      border:1px solid #d1d5db;
      border-radius:14px;
      padding:12px 16px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      background:#fff;
      color:var(--text);
    }

    #smart-dagens-dato .fact-box{
      background:var(--panel);
      border:1px solid var(--card-border);
      border-radius:20px;
      padding:18px;
    }

    #smart-dagens-dato .fact-box h2{
      margin:0 0 12px;
      text-align:center;
      font-size:clamp(24px,2vw,30px);
      line-height:1.1;
      color:var(--text);
    }

    #smart-dagens-dato .fact{
      background:var(--highlight);
      border:1px solid #d1d5db;
      border-radius:16px;
      padding:18px;
      font-size:clamp(18px,1.6vw,24px);
      line-height:1.55;
      text-align:center;
      color:#374151;
      min-height:96px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    @media (max-width: 900px){
      #smart-dagens-dato .top-grid{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 640px){
      #smart-dagens-dato .module{
        padding:20px 16px 18px;
      }

      #smart-dagens-dato .actions{
        flex-direction:column;
      }

      #smart-dagens-dato button.primary,
      #smart-dagens-dato button.secondary{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <nav class="site-nav">
    <img class="logo" src="/assets/logo.png" onerror="this.style.display='none'" alt="SmartZonen logo" />
    <a class="site-title" href="/">SmartZonen</a>
    <div class="nav-links">
      <a href="/">Start</a>
      <a href="/pustero.html">Pustero</a>
      <a href="/grupper.html">Grupper</a>
      <a href="/dagens-dato.html" class="active">Dagens dato</a>
      <a href="/leg-med-lyde-1.html">Leg med lyde 1</a>
      <a href="/leg-med-lyde-2.html">Leg med lyde 2</a>
      <a href="/saetningsmaskinen.html">Sætningsmaskinen</a>
      <a href="/laer-klokken.html">Lær klokken</a>
      <a href="/regnemaskinen.html">Regnemaskinen</a>
    </div>
  </nav>

  <div class="hero">
    <img src="/assets/banner.jpg" onerror="this.closest('.hero').style.display='none'" alt="SmartZonen banner" />
  </div>

  <div class="info-band">
    <h1>Dagens dato</h1>
    <p>Hvad er spændende ved netop denne dato?</p>
  </div>

  <main class="page-content">
    <div id="smart-dagens-dato">
      <div class="module">
        <div class="module-inner">
          <div class="top-grid">
            <div class="card">
              <button class="display-btn" id="dateDisplay" type="button">
                <span id="fullDateText"></span>
                <small>Tryk på knapperne for at ændre datoen</small>
              </button>
            </div>

            <div class="card picker-card">
              <div class="picker-title">Dag</div>
              <div class="wheel">
                <div class="wheel-list" id="dayWheel"></div>
              </div>
              <div class="picker-actions">
                <button class="picker-btn cancel" type="button" id="dayMinus">− 1</button>
                <button class="picker-btn ok" type="button" id="dayPlus">+ 1</button>
              </div>
            </div>

            <div class="card picker-card">
              <div class="picker-title">Måned og år</div>
              <div class="wheel">
                <div class="wheel-list" id="monthWheel"></div>
              </div>
              <div class="picker-actions">
                <button class="picker-btn cancel" type="button" id="monthMinus">Forrige</button>
                <button class="picker-btn ok" type="button" id="monthPlus">Næste</button>
              </div>
            </div>
          </div>

          <div class="actions">
            <button class="primary" id="todayBtn" type="button">Gå til i dag</button>
            <button class="secondary" id="randomBtn" type="button">Vælg en tilfældig dato</button>
          </div>

          <div class="fact-box">
            <h2>Vidste du det?</h2>
            <div class="fact" id="factBox"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <p>© 2026 SmartZonen</p>
  </footer>

  <script>
    (() => {
      const months = [
        "januar", "februar", "marts", "april", "maj", "juni",
        "juli", "august", "september", "oktober", "november", "december"
      ];

      const weekdays = [
        "søndag", "mandag", "tirsdag", "onsdag", "torsdag", "fredag", "lørdag"
      ];

      const factBox = document.getElementById("factBox");
      const fullDateText = document.getElementById("fullDateText");
      const dayWheel = document.getElementById("dayWheel");
      const monthWheel = document.getElementById("monthWheel");

      const todayBtn = document.getElementById("todayBtn");
      const randomBtn = document.getElementById("randomBtn");
      const dayMinus = document.getElementById("dayMinus");
      const dayPlus = document.getElementById("dayPlus");
      const monthMinus = document.getElementById("monthMinus");
      const monthPlus = document.getElementById("monthPlus");

      let selectedDate = new Date();
      selectedDate.setHours(12, 0, 0, 0);

      function formatFullDate(date) {
        const weekday = weekdays[date.getDay()];
        const day = date.getDate();
        const month = months[date.getMonth()];
        const year = date.getFullYear();
        return `${weekday} den ${day}. ${month} ${year}`;
      }

      function isLeapYear(year) {
        return (year % 4 === 0 && year % 100 !== 0) || year % 400 === 0;
      }

      function daysInMonth(year, monthIndex) {
        return new Date(year, monthIndex + 1, 0).getDate();
      }

      function dayOfYear(date) {
        const start = new Date(date.getFullYear(), 0, 0);
        const diff = date - start;
        const oneDay = 1000 * 60 * 60 * 24;
        return Math.floor(diff / oneDay);
      }

      function weekNumber(date) {
        const copy = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        const dayNum = copy.getUTCDay() || 7;
        copy.setUTCDate(copy.getUTCDate() + 4 - dayNum);
        const yearStart = new Date(Date.UTC(copy.getUTCFullYear(), 0, 1));
        return Math.ceil((((copy - yearStart) / 86400000) + 1) / 7);
      }

      function seasonText(monthIndex) {
        if (monthIndex === 11 || monthIndex <= 1) return "Det er vinter.";
        if (monthIndex >= 2 && monthIndex <= 4) return "Det er forår.";
        if (monthIndex >= 5 && monthIndex <= 7) return "Det er sommer.";
        return "Det er efterår.";
      }

      function dateFacts(date) {
        const year = date.getFullYear();
        const month = date.getMonth();
        const day = date.getDate();
        const ordinal = dayOfYear(date);
        const totalDays = isLeapYear(year) ? 366 : 365;
        const remaining = totalDays - ordinal;
        const week = weekNumber(date);
        const isWeekend = date.getDay() === 0 || date.getDay() === 6;

        const facts = [
          `Denne dato er dag nummer ${ordinal} i året. Der er ${remaining} dage tilbage af året.`,
          `Vi er i uge ${week}.`,
          `${seasonText(month)}`,
          isWeekend ? "Det er weekend." : "Det er en hverdag.",
          `Måneden ${months[month]} har ${daysInMonth(year, month)} dage.`,
          `Dagen efter er ${formatFullDate(new Date(year, month, day + 1))}.`,
          `Dagen før var ${formatFullDate(new Date(year, month, day - 1))}.`
        ];

        return facts;
      }

      function buildDayWheel() {
        dayWheel.innerHTML = "";
        const maxDays = daysInMonth(selectedDate.getFullYear(), selectedDate.getMonth());

        for (let i = 1; i <= maxDays; i++) {
          const item = document.createElement("div");
          item.className = "wheel-item";
          item.textContent = i;
          if (i === selectedDate.getDate()) {
            item.classList.add("active");
          }

          item.addEventListener("click", () => {
            selectedDate.setDate(i);
            render();
          });

          dayWheel.appendChild(item);
        }
      }

      function buildMonthWheel() {
        monthWheel.innerHTML = "";

        for (let offset = -6; offset <= 6; offset++) {
          const date = new Date(selectedDate.getFullYear(), selectedDate.getMonth() + offset, 1);
          const item = document.createElement("div");
          item.className = "wheel-item";
          item.textContent = `${months[date.getMonth()]} ${date.getFullYear()}`;

          if (
            date.getMonth() === selectedDate.getMonth() &&
            date.getFullYear() === selectedDate.getFullYear()
          ) {
            item.classList.add("active");
          }

          item.addEventListener("click", () => {
            const currentDay = selectedDate.getDate();
            const max = daysInMonth(date.getFullYear(), date.getMonth());
            selectedDate = new Date(
              date.getFullYear(),
              date.getMonth(),
              Math.min(currentDay, max),
              12, 0, 0, 0
            );
            render();
          });

          monthWheel.appendChild(item);
        }
      }

      function scrollActiveIntoView(container) {
        const active = container.querySelector(".wheel-item.active");
        if (!active) return;
        active.scrollIntoView({ block: "center", behavior: "smooth" });
      }

      function renderFact() {
        const facts = dateFacts(selectedDate);
        const index = Math.abs(
          (selectedDate.getDate() * 7) +
          (selectedDate.getMonth() * 3) +
          selectedDate.getFullYear()
        ) % facts.length;

        factBox.textContent = facts[index];
      }

      function render() {
        fullDateText.textContent = formatFullDate(selectedDate);
        buildDayWheel();
        buildMonthWheel();
        renderFact();

        requestAnimationFrame(() => {
          scrollActiveIntoView(dayWheel);
          scrollActiveIntoView(monthWheel);
        });
      }

      function goToToday() {
        selectedDate = new Date();
        selectedDate.setHours(12, 0, 0, 0);
        render();
      }

      function goToRandomDate() {
        const year = 2026;
        const month = Math.floor(Math.random() * 12);
        const day = 1 + Math.floor(Math.random() * daysInMonth(year, month));
        selectedDate = new Date(year, month, day, 12, 0, 0, 0);
        render();
      }

      dayMinus.addEventListener("click", () => {
        selectedDate.setDate(selectedDate.getDate() - 1);
        render();
      });

      dayPlus.addEventListener("click", () => {
        selectedDate.setDate(selectedDate.getDate() + 1);
        render();
      });

      monthMinus.addEventListener("click", () => {
        const currentDay = selectedDate.getDate();
        const newDate = new Date(selectedDate.getFullYear(), selectedDate.getMonth() - 1, 1, 12, 0, 0, 0);
        const max = daysInMonth(newDate.getFullYear(), newDate.getMonth());
        selectedDate = new Date(newDate.getFullYear(), newDate.getMonth(), Math.min(currentDay, max), 12, 0, 0, 0);
        render();
      });

      monthPlus.addEventListener("click", () => {
        const currentDay = selectedDate.getDate();
        const newDate = new Date(selectedDate.getFullYear(), selectedDate.getMonth() + 1, 1, 12, 0, 0, 0);
        const max = daysInMonth(newDate.getFullYear(), newDate.getMonth());
        selectedDate = new Date(newDate.getFullYear(), newDate.getMonth(), Math.min(currentDay, max), 12, 0, 0, 0);
        render();
      });

      todayBtn.addEventListener("click", goToToday);
      randomBtn.addEventListener("click", goToRandomDate);

      render();
    })();
  </script>
</body>
</html>
